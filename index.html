<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghoststomper Sphere Controller</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; margin: 0; padding: 20px; }
        h1 { color: #00ffcc; text-align: center; }
        .container { display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; max-width: 1100px; margin: 30px auto; }
        canvas { border: 6px solid #333; border-radius: 50%; box-shadow: 0 0 50px rgba(0,255,200,0.5); cursor: crosshair; }
        .preview { width: 150px; height: 150px; border: 6px solid #444; border-radius: 15px; margin: 20px auto; }
        .info { background: #1f1f1f; padding: 25px; border-radius: 12px; min-width: 340px; }
        button { padding: 14px 24px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .send-btn { background: #ff6600; color: white; padding: 18px; font-size: 1.25em; }
        .status { margin: 15px; padding: 14px; border-radius: 8px; font-weight: bold; }
        .success { background: #004d00; color: #0f0; }
        .error { background: #4d0000; color: #f66; }
    </style>
</head>
<body>
    <h1>Ghoststomper Sphere Controller</h1>

    <div id="loginSection">
        <button onclick="authorizeUser()" style="background:#4285f4; color:white; padding:16px; font-size:1.1em; width:100%;">🔑 Authorize YouTube Access</button>
        <p style="color:#aaa; margin-top:10px;">This will allow posting to chat as you</p>
    </div>

    <div id="mainApp" style="display:none;">
        <div class="container">
            <div>
                <canvas id="colorWheel" width="440" height="440"></canvas>
                <div class="preview" id="preview"></div>
            </div>

            <div class="info">
                <h2 id="greeting">Welcome</h2>
                <p><strong>Chat ID:</strong> <span id="chatIdDisplay">From chatid.txt</span></p>
                
                <div class="value"><span>Hex</span><span id="hexValue">#ffffff</span></div>
                <div class="value"><span>HSV</span><span id="hsvValue">298, 92, 100</span></div>
                
                <button onclick="sendToSphere()" class="send-btn">🚀 SEND TO SPHERE</button>
				<button onclick="claimCube()" class="send-btn">🚀 STEAL CUBE</button>
                <div id="status" class="status"></div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "657813631271-6ecm6f2p18f1525c3ac0ji9rg8746clq.apps.googleusercontent.com";
        let accessToken = null;
        let currentHue = 298, currentSat = 92;
        let liveChatId = "";

        async function loadChatId() {
            try {
                const res = await fetch('chatid.txt');
                liveChatId = (await res.text()).trim();
                document.getElementById('chatIdDisplay').textContent = liveChatId ? liveChatId.substring(0,25) + "..." : "Not found";
            } catch (e) {}
        }

        function authorizeUser() {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: "https://www.googleapis.com/auth/youtube.force-ssl",
                callback: (response) => {
                    if (response.access_token) {
                        accessToken = response.access_token;
                        document.getElementById('loginSection').style.display = 'none';
                        document.getElementById('mainApp').style.display = 'block';
                        document.getElementById('greeting').textContent = "✅ Authorized";
                        initColorWheel();
                        loadChatId();
                    }
                }
            });
            client.requestAccessToken();
        }

        function initColorWheel() {
            const canvas = document.getElementById('colorWheel');
            const ctx = canvas.getContext('2d');
            drawColorWheel(canvas, ctx);
            updateUI();

            let dragging = false;
            const pick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const dx = x - 220, dy = y - 220;
                const dist = Math.sqrt(dx*dx + dy*dy);
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                if (angle < 0) angle += 360;
                currentHue = angle;
                currentSat = Math.min(100, (dist / 135) * 100);
                updateUI();
            };
            canvas.addEventListener('mousedown', e => { dragging = true; pick(e); });
            canvas.addEventListener('mousemove', e => { if (dragging) pick(e); });
            document.addEventListener('mouseup', () => dragging = false);
        }

        function drawColorWheel(canvas, ctx) {
            const cx = 220, cy = 220, r = 200;
            for (let a = 0; a < 360; a++) {
                const rad = a * Math.PI / 180;
                ctx.strokeStyle = `hsl(${a}, 100%, 50%)`;
                ctx.lineWidth = 26;
                ctx.beginPath();
                ctx.arc(cx, cy, r - 22, rad - 0.04, rad + 0.04);
                ctx.stroke();
            }
            const grad = ctx.createRadialGradient(cx, cy, r-65, cx, cy, 0);
            grad.addColorStop(0, '#000'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(cx, cy, r-65, 0, Math.PI*2); ctx.fill();
        }

        function updateUI() {
            const rgb = hsvToRgb(currentHue, currentSat, 100);
            const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
            document.getElementById('preview').style.backgroundColor = hex;
            document.getElementById('hexValue').textContent = hex;
            document.getElementById('hsvValue').textContent = `${Math.round(currentHue)}, ${Math.round(currentSat)}, 100`;
        }

        function hsvToRgb(h, s, v) {
            h = h % 360; s /= 100; v /= 100;
            let c = v*s, x = c*(1-Math.abs((h/60)%2-1)), m = v-c, r=0,g=0,b=0;
            if (h<60) {r=c;g=x;} else if (h<120) {r=x;g=c;} else if (h<180) {g=c;b=x;}
            else if (h<240) {g=x;b=c;} else if (h<300) {r=x;b=c;} else {r=c;b=x;}
            return {r:Math.round((r+m)*255), g:Math.round((g+m)*255), b:Math.round((b+m)*255)};
        }

        function rgbToHex(r,g,b) {
            return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
        }

        async function sendToSphere() {
            if (!liveChatId) return alert("No Chat ID loaded from chatid.txt");

            let hue = Math.round(currentHue);
            let sat = Math.round(currentSat);
            if (sat === 100) sat = 99;
            const code = hue.toString().padStart(3,'0') + sat.toString().padStart(2,'0');

            const status = document.getElementById('status');
            status.textContent = `Sending !sphere ${code}...`;
            status.className = 'status';

            try {
                const res = await fetch('https://www.googleapis.com/youtube/v3/liveChat/messages?part=snippet', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        snippet: {
                            liveChatId: liveChatId,
                            type: "textMessageEvent",
                            textMessageDetails: { messageText: `!sphere ${code}` }
                        }
                    })
                });

                if (res.ok) {
                    status.textContent = `✅ !sphere ${code} sent to chat!`;
                    status.className = 'status success';
                } else {
                    const errText = await res.text();
                    throw new Error(errText);
                }
            } catch (err) {
                status.textContent = `❌ ${err.message}`;
                status.className = 'status error';
            }
        }

 async function claimCube() {
            if (!liveChatId) return alert("No Chat ID loaded from chatid.txt");

            let hue = Math.round(currentHue);
            let sat = Math.round(currentSat);
            if (sat === 100) sat = 99;
            const code = hue.toString().padStart(3,'0') + sat.toString().padStart(2,'0');

            const status = document.getElementById('status');
            status.textContent = `Sending !sphere ${code}...`;
            status.className = 'status';

            try {
                const res = await fetch('https://www.googleapis.com/youtube/v3/liveChat/messages?part=snippet', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        snippet: {
                            liveChatId: liveChatId,
                            type: "textMessageEvent",
                            textMessageDetails: { messageText: `!cube` }
                        }
                    })
                });

                if (res.ok) {
                    status.textContent = `✅ Cube steal sent to chat!`;
                    status.className = 'status success';
                } else {
                    const errText = await res.text();
                    throw new Error(errText);
                }
            } catch (err) {
                status.textContent = `❌ ${err.message}`;
                status.className = 'status error';
            }
        }

        window.onload = initGoogle;
    </script>
</body>
</html>
